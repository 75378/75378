<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie 5 - Formularz i walidacja</title>
    <h1>
        Bohdan Melchenko 75378
    </h1>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            max-width: 300px;
            padding: 8px;
            box-sizing: border-box;
        }
        .error-message {
            color: red;
            font-size: 0.85em;
            display: none;
            margin-top: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .success-message {
            color: green;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Zadanie 5 – Formularz i walidacja</h2>

    <form id="contactForm">
        <div class="form-group">
            <label for="imie">Imię:</label>
            <input type="text" id="imie" placeholder="Wpisz imię">
            <div class="error-message" id="error-imie"></div>
        </div>

        <div class="form-group">
            <label for="nazwisko">Nazwisko:</label>
            <input type="text" id="nazwisko" placeholder="Wpisz nazwisko">
            <div class="error-message" id="error-nazwisko"></div>
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="Wpisz e-mail">
            <div class="error-message" id="error-email"></div>
        </div>

        <div class="form-group">
            <label for="wiadomosc">Wiadomość:</label>
            <textarea id="wiadomosc" rows="4" placeholder="Napisz wiadomość..."></textarea>
            <div class="error-message" id="error-wiadomosc"></div>
        </div>

        <button type="submit">Sprawdź (Waliduj)</button>
        
        <div id="result-message"></div>
    </form>

    <script src="script.js"></script>
</body>
</html>
